<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MultiCam Pro</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #273348;
    --border: #334155;
    --accent: #38bdf8;
    --accent-dim: rgba(56,189,248,0.15);
    --accent-hover: #7dd3fc;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --text-dim: #64748b;
    --success: #34d399;
    --error: #f87171;
    --error-bg: rgba(248,113,113,0.1);
    --rec: #ef4444;
    --rec-dim: rgba(239,68,68,0.15);
    --radius: 12px;
    --radius-sm: 8px;
    --radius-xs: 6px;
  }

  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: 'Inter', system-ui, -apple-system, sans-serif; overflow-x: hidden;
  }

  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; }

  /* ══════════════════════════════
     CONFIG SCREEN
  ══════════════════════════════ */
  #config-screen { flex-direction: column; align-items: center; padding: 48px 24px 64px; }

  .hero { text-align: center; margin-bottom: 48px; }
  .hero h1 {
    font-size: clamp(2.2rem, 5.5vw, 4rem); font-weight: 800; letter-spacing: -0.04em;
    background: linear-gradient(135deg, var(--accent) 0%, #818cf8 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; line-height: 1.05;
  }
  .hero h1 span { -webkit-text-fill-color: transparent; }
  .hero .tagline { color: var(--text-muted); font-size: 1rem; margin-top: 10px; }

  .config-wrapper {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
    width: 100%; max-width: 720px; margin-bottom: 28px;
  }
  @media (max-width: 600px) { .config-wrapper { grid-template-columns: 1fr; } }

  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .panel-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); margin-bottom: 16px; }

  .grid-selector { display: flex; gap: 8px; }
  .grid-btn {
    flex: 1; aspect-ratio: 1; max-width: 64px;
    background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text-muted); cursor: pointer; transition: all 0.15s ease;
    display: flex; align-items: center; justify-content: center; position: relative;
  }
  .grid-btn:hover { border-color: var(--accent); color: var(--accent); }
  .grid-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
  .grid-btn .grid-icon { display: grid; gap: 3px; pointer-events: none; }
  .grid-btn .grid-dot { width: 7px; height: 7px; border-radius: 2px; background: currentColor; opacity: 0.7; }
  .grid-btn .btn-label { position: absolute; bottom: 4px; right: 6px; font-size: 9px; font-weight: 700; opacity: 0.6; }

  .device-list { display: flex; flex-direction: column; gap: 8px; min-height: 80px; }
  .device-item {
    display: flex; align-items: center; gap: 12px; padding: 10px 14px;
    background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-xs);
    cursor: pointer; transition: all 0.15s ease; user-select: none;
  }
  .device-item:hover { border-color: var(--accent); }
  .device-item.selected { background: var(--accent-dim); border-color: var(--accent); }
  .device-item .check {
    width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s ease;
  }
  .device-item.selected .check { background: var(--accent); border-color: var(--accent); }
  .device-item.selected .check::after {
    content: ''; width: 5px; height: 9px; border: 2px solid var(--bg);
    border-top: none; border-left: none; transform: rotate(45deg) translateY(-1px); display: block;
  }
  .device-name { font-size: 13px; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .device-idx { font-size: 11px; color: var(--text-dim); font-weight: 600; background: var(--surface); padding: 2px 7px; border-radius: 20px; }
  .no-devices { color: var(--text-dim); font-size: 13px; text-align: center; padding: 20px; border: 1px dashed var(--border); border-radius: var(--radius-xs); }

  .action-area { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; max-width: 720px; }
  .btn-watch {
    width: 100%; max-width: 320px; padding: 14px 32px;
    background: var(--accent); color: #0f172a; border: none; border-radius: var(--radius);
    font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s ease;
  }
  .btn-watch:disabled { background: var(--surface2); color: var(--text-dim); cursor: not-allowed; border: 1px solid var(--border); }
  .btn-watch:not(:disabled):hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 8px 20px rgba(56,189,248,0.25); }
  .btn-watch:not(:disabled):active { transform: translateY(0); }
  .hint { font-size: 13px; color: var(--text-dim); text-align: center; }
  .hint span { color: var(--accent); font-weight: 600; }
  .permission-msg {
    font-size: 13px; color: var(--error); text-align: center; padding: 10px 16px;
    background: var(--error-bg); border-radius: var(--radius-xs);
    border: 1px solid rgba(248,113,113,0.2); max-width: 480px;
  }

  /* ══════════════════════════════
     VIEWER SCREEN
  ══════════════════════════════ */
  #viewer-screen { flex-direction: column; background: #080f1e; min-height: 100vh; }

  .viewer-bar {
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
    padding: 10px 16px; background: rgba(15,23,42,0.97); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border); flex-shrink: 0; position: sticky; top: 0; z-index: 20;
  }
  .viewer-title { font-size: 13px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; }
  .viewer-title span { color: var(--accent); }

  .viewer-toolbar { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }

  .btn-tool {
    display: flex; align-items: center; gap: 6px; padding: 7px 13px;
    border-radius: var(--radius-xs); font-size: 12px; font-weight: 600; cursor: pointer;
    transition: all 0.15s ease; border: 1px solid var(--border);
    background: var(--surface); color: var(--text-muted); white-space: nowrap;
  }
  .btn-tool svg { width: 14px; height: 14px; flex-shrink: 0; }
  .btn-tool:hover { border-color: var(--accent); color: var(--accent); }

  .btn-tool.photo  { border-color: var(--accent); color: var(--accent); }
  .btn-tool.photo:hover { background: var(--accent-dim); }

  .btn-tool.rec-all { border-color: var(--rec); color: var(--rec); }
  .btn-tool.rec-all:hover { background: var(--rec-dim); }
  .btn-tool.rec-all.recording { background: var(--rec-dim); }

  .btn-back {
    display: flex; align-items: center; gap: 7px; padding: 7px 13px;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xs);
    color: var(--text-muted); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s ease;
  }
  .btn-back:hover { border-color: var(--accent); color: var(--accent); }
  .btn-back svg { width: 14px; height: 14px; }

  /* Gallery badge */
  .gallery-badge { background: var(--accent); color: #0f172a; font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 10px; margin-left: 2px; }

  /* ══════════════════════════════
     CAMERA GRID  — clave: object-fit:cover, sin barras negras
  ══════════════════════════════ */
  .viewer-grid-container {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 16px; overflow: auto;
  }

  .cam-grid {
    display: grid; gap: 10px; width: 100%;
    align-items: stretch; justify-items: stretch;
  }
  .cam-grid.count-1 { grid-template-columns: 1fr; max-width: 1200px; }
  .cam-grid.count-2 { grid-template-columns: repeat(2, 1fr); max-width: 1200px; }
  .cam-grid.count-3 { grid-template-columns: repeat(2, 1fr); max-width: 1000px; }
  .cam-grid.count-4 { grid-template-columns: repeat(2, 1fr); max-width: 1000px; }

  /*
   * cam-cell: el truco de "sin barras negras"
   * — aspect-ratio fijo a 16/9 por defecto
   * — overflow:hidden para que el cover no se salga
   * — el borde neón sigue exactamente el recuadro del contenedor
   *   que, al usar object-fit:cover, ya no tiene zonas negras
   */
  .cam-cell {
    position: relative; width: 100%; overflow: hidden;
    border-radius: var(--radius);
    aspect-ratio: 16 / 9;          /* se sobreescribe con JS al conocer resolución real */
    background: #000;
    /* Neón por defecto (apagado) */
    border: 1.5px solid var(--border);
    box-shadow: none;
    transition: border-color 0.25s, box-shadow 0.25s;
  }
  /* Neón activo — se aplica por JS cuando el stream está vivo */
  .cam-cell.neon {
    border-color: var(--accent);
    box-shadow:
      0 0 6px 1px rgba(56,189,248,0.45),
      0 0 18px 3px rgba(56,189,248,0.18),
      inset 0 0 6px rgba(56,189,248,0.06);
  }
  .cam-cell.neon.recording-cell {
    border-color: var(--rec);
    box-shadow:
      0 0 6px 1px rgba(239,68,68,0.5),
      0 0 18px 3px rgba(239,68,68,0.2),
      inset 0 0 6px rgba(239,68,68,0.06);
  }
  .cam-cell.count-3:last-child { grid-column: 1 / -1; justify-self: center; width: 50%; }

  /* video cubre TODO el contenedor → cero barras negras */
  .cam-cell video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;   /* ← clave: rellena sin barras */
    display: block;
  }

  /* Label */
  .cam-label {
    position: absolute; bottom: 10px; left: 10px; right: 10px;
    pointer-events: none; z-index: 2;
  }
  .cam-label-inner {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 4px 10px; background: rgba(15,23,42,0.78);
    backdrop-filter: blur(8px); border: 1px solid rgba(56,189,248,0.2);
    border-radius: 20px; max-width: 100%;
  }
  .cam-label-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); flex-shrink: 0; animation: pulse 2s infinite; }
  .cam-label-dot.rec { background: var(--rec); animation: blink 1s infinite; }
  @keyframes pulse  { 0%,100%{opacity:1;} 50%{opacity:.4;} }
  @keyframes blink  { 0%,100%{opacity:1;} 50%{opacity:.15;} }
  .cam-label-text { font-size: 12px; color: var(--text); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rec-timer { font-size: 11px; font-weight: 700; color: var(--rec); font-variant-numeric: tabular-nums; }

  /* Per-cell controls (aparecen al hover) */
  .cam-controls {
    position: absolute; top: 8px; right: 8px; display: flex; gap: 6px;
    opacity: 0; transition: opacity 0.2s; z-index: 3;
  }
  .cam-cell:hover .cam-controls { opacity: 1; }
  .ctrl-btn {
    width: 32px; height: 32px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(15,23,42,0.72); backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s ease; color: var(--text-muted);
  }
  .ctrl-btn:hover { background: rgba(56,189,248,0.2); border-color: var(--accent); color: var(--accent); }
  .ctrl-btn.rec-btn:hover, .ctrl-btn.rec-btn.active { background: var(--rec-dim); border-color: var(--rec); color: var(--rec); }
  .ctrl-btn svg { width: 14px; height: 14px; }

  /* Flash para foto */
  .flash-overlay {
    position: absolute; inset: 0; background: #fff;
    opacity: 0; pointer-events: none; z-index: 10; border-radius: var(--radius);
  }
  .flash-overlay.flash { animation: flash-anim 0.35s ease-out forwards; }
  @keyframes flash-anim { 0%{opacity:.9;} 100%{opacity:0;} }

  /* Error / loading */
  .cam-error {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px; padding: 20px;
    background: rgba(8,15,30,.95); z-index: 4;
  }
  .cam-error-icon { width: 40px; height: 40px; border-radius: 50%; background: var(--error-bg); border: 1.5px solid rgba(248,113,113,.3); display: flex; align-items: center; justify-content: center; color: var(--error); font-size: 18px; font-weight: 700; }
  .cam-error h3  { font-size: 14px; color: var(--error); font-weight: 600; text-align: center; }
  .cam-error p   { font-size: 12px; color: var(--text-dim); text-align: center; max-width: 200px; line-height: 1.5; }
  .cam-loading   { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(8,15,30,.8); z-index: 4; }
  .cam-spinner   { width: 32px; height: 32px; border: 2.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ══════════════════════════════
     GALLERY PANEL
  ══════════════════════════════ */
  #gallery-panel {
    position: fixed; right: 0; top: 0; bottom: 0; width: 300px;
    background: rgba(15,23,42,.98); backdrop-filter: blur(12px);
    border-left: 1px solid var(--border); z-index: 50;
    display: flex; flex-direction: column;
    transform: translateX(100%); transition: transform .3s cubic-bezier(.4,0,.2,1);
  }
  #gallery-panel.open { transform: translateX(0); }

  .gallery-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .gallery-header h2 { font-size: 14px; font-weight: 600; }
  .gallery-count { font-size: 11px; color: var(--accent); background: var(--accent-dim); padding: 2px 8px; border-radius: 20px; font-weight: 600; }
  .btn-close-gallery { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 20px; line-height: 1; padding: 2px 6px; border-radius: 4px; }
  .btn-close-gallery:hover { color: var(--text); background: var(--surface2); }

  .gallery-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .gallery-tab { flex: 1; padding: 10px; font-size: 12px; font-weight: 600; text-align: center; cursor: pointer; color: var(--text-dim); border-bottom: 2px solid transparent; transition: all .15s; background: none; border-top: none; border-left: none; border-right: none; }
  .gallery-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .gallery-items { flex: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; align-content: start; }
  .gallery-items.videos-tab { grid-template-columns: 1fr; }

  .gallery-item { position: relative; border-radius: var(--radius-xs); overflow: hidden; border: 1px solid var(--border); cursor: pointer; transition: border-color .15s; background: #000; }
  .gallery-item:hover { border-color: var(--accent); }
  .gallery-item img  { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
  .gallery-item video { width: 100%; max-height: 110px; object-fit: cover; display: block; }
  .g-meta { padding: 5px 7px; background: var(--surface2); }
  .g-meta .g-name { font-size: 10px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .g-meta .g-time { font-size: 10px; color: var(--text-dim); }
  .item-dl {
    position: absolute; top: 5px; right: 5px; width: 26px; height: 26px; border-radius: 50%;
    background: rgba(15,23,42,.8); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; opacity: 0; transition: opacity .15s; color: var(--text);
  }
  .gallery-item:hover .item-dl { opacity: 1; }
  .item-dl:hover { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .item-dl svg { width: 12px; height: 12px; }
  .gallery-empty { grid-column: 1/-1; text-align: center; padding: 32px 16px; color: var(--text-dim); font-size: 13px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- ══ CONFIG SCREEN ══ -->
<div id="config-screen" class="screen active">
  <div class="hero">
    <h1>MultiCam Pro</h1>
    <p class="tagline">Observa, fotografía y graba tus cámaras USB en tiempo real</p>
  </div>

  <div class="config-wrapper">
    <div class="panel">
      <div class="panel-title">Configuración de Vista</div>
      <div class="grid-selector" id="grid-selector">
        <button class="grid-btn active" data-count="1">
          <span class="grid-icon" style="display:grid;grid-template-columns:1fr;"><span class="grid-dot"></span></span>
          <span class="btn-label">1</span>
        </button>
        <button class="grid-btn" data-count="2">
          <span class="grid-icon" style="display:grid;grid-template-columns:1fr 1fr;gap:3px;"><span class="grid-dot"></span><span class="grid-dot"></span></span>
          <span class="btn-label">2</span>
        </button>
        <button class="grid-btn" data-count="3">
          <span class="grid-icon" style="display:grid;grid-template-columns:1fr 1fr;gap:3px;"><span class="grid-dot"></span><span class="grid-dot"></span><span class="grid-dot"></span><span class="grid-dot" style="opacity:0"></span></span>
          <span class="btn-label">3</span>
        </button>
        <button class="grid-btn" data-count="4">
          <span class="grid-icon" style="display:grid;grid-template-columns:1fr 1fr;gap:3px;"><span class="grid-dot"></span><span class="grid-dot"></span><span class="grid-dot"></span><span class="grid-dot"></span></span>
          <span class="btn-label">4</span>
        </button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Activas</div>
      <div class="device-list" id="device-list">
        <div class="no-devices">Cargando dispositivos…</div>
      </div>
    </div>
  </div>

  <div class="action-area">
    <div id="permission-error" class="permission-msg" style="display:none"></div>
    <button class="btn-watch" id="btn-watch" disabled>Observar</button>
    <p class="hint" id="hint-text">Selecciona las cámaras que quieres observar</p>
  </div>
</div>

<!-- ══ VIEWER SCREEN ══ -->
<div id="viewer-screen" class="screen">
  <div class="viewer-bar">
    <div class="viewer-title">MultiCam Pro — <span id="viewer-count-label">0 cámaras</span></div>
    <div class="viewer-toolbar">
      <button class="btn-tool photo" id="btn-photo-all">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="1" y="4" width="14" height="10" rx="2"/>
          <circle cx="8" cy="9" r="2.5"/>
          <path d="M5.5 4L6.5 2h3l1 2" stroke-linecap="round"/>
        </svg>
        Foto
      </button>
      <button class="btn-tool rec-all" id="btn-rec-all">
        <svg viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="5"/></svg>
        <span id="rec-all-label">Grabar todo</span>
      </button>
      <button class="btn-tool" id="btn-gallery">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="1" y="3" width="14" height="10" rx="2"/>
          <path d="M1 11l4-4 3 3 2-2 5 5" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="5" cy="7" r="1" fill="currentColor" stroke="none"/>
        </svg>
        Galería <span class="gallery-badge" id="gallery-badge" style="display:none">0</span>
      </button>
      <button class="btn-back" id="btn-back">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M10 12L6 8l4-4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Volver
      </button>
    </div>
  </div>
  <div class="viewer-grid-container">
    <div class="cam-grid" id="cam-grid"></div>
  </div>
</div>

<!-- ══ GALLERY PANEL ══ -->
<div id="gallery-panel">
  <div class="gallery-header">
    <div style="display:flex;align-items:center;gap:8px;">
      <h2>Galería</h2>
      <span class="gallery-count" id="gallery-total">0</span>
    </div>
    <button class="btn-close-gallery" id="btn-close-gallery">×</button>
  </div>
  <div class="gallery-tabs">
    <button class="gallery-tab active" data-tab="photos">Fotos (<span id="photos-count">0</span>)</button>
    <button class="gallery-tab" data-tab="videos">Vídeos (<span id="videos-count">0</span>)</button>
  </div>
  <div class="gallery-items" id="gallery-items"></div>
</div>

<script>
/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
const S = {
  devices: [], selectedCount: 1, selectedDevices: [],
  activeStreams: [],
  recorders: new Map(),   // cellIdx → {recorder,chunks,camLabel}
  recTimers:  new Map(),  // cellIdx → intervalId
  recStart:   new Map(),  // cellIdx → timestamp
  globalRecording: false,
  photos: [], videos: [],
  galleryTab: 'photos',
};

/* ══════════════════════════════════════════
   REFS
══════════════════════════════════════════ */
const $  = id => document.getElementById(id);
const configScreen  = $('config-screen');
const viewerScreen  = $('viewer-screen');
const deviceList    = $('device-list');
const gridSelector  = $('grid-selector');
const btnWatch      = $('btn-watch');
const btnBack       = $('btn-back');
const hintText      = $('hint-text');
const camGrid       = $('cam-grid');
const viewerLabel   = $('viewer-count-label');
const permErr       = $('permission-error');
const btnPhotoAll   = $('btn-photo-all');
const btnRecAll     = $('btn-rec-all');
const recAllLabel   = $('rec-all-label');
const btnGallery    = $('btn-gallery');
const galleryPanel  = $('gallery-panel');
const galleryItems  = $('gallery-items');
const galleryBadge  = $('gallery-badge');
const galleryTotal  = $('gallery-total');
const photosCount   = $('photos-count');
const videosCount   = $('videos-count');

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
async function init() {
  try {
    const tmp = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    tmp.getTracks().forEach(t => t.stop());
    permErr.style.display = 'none';
  } catch(e) { showPermError(e); return; }
  await refreshDevices();
  navigator.mediaDevices.addEventListener('devicechange', refreshDevices);
}

function showPermError(e) {
  let m = 'No se pudo acceder a la cámara.';
  if (e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError')
    m = 'Permiso denegado. Habilita el acceso en la configuración del navegador y recarga.';
  else if (e.name === 'NotFoundError')
    m = 'No se detectó ninguna cámara. Conecta un dispositivo USB e intenta de nuevo.';
  permErr.textContent = m; permErr.style.display = 'block';
  deviceList.innerHTML = '<div class="no-devices">Sin acceso a dispositivos</div>';
}

async function refreshDevices() {
  const all = await navigator.mediaDevices.enumerateDevices();
  S.devices = all.filter(d => d.kind === 'videoinput');
  S.selectedDevices = S.selectedDevices.filter(id => S.devices.some(d => d.deviceId === id));
  renderDeviceList(); updateWatchBtn();
}

/* ══════════════════════════════════════════
   CONFIG UI
══════════════════════════════════════════ */
function renderDeviceList() {
  if (!S.devices.length) { deviceList.innerHTML = '<div class="no-devices">No se encontraron cámaras</div>'; return; }
  deviceList.innerHTML = '';
  S.devices.forEach((dev, i) => {
    const label = dev.label || `Cámara ${i+1}`;
    const sel = S.selectedDevices.includes(dev.deviceId);
    const el = document.createElement('div');
    el.className = 'device-item' + (sel ? ' selected' : '');
    el.innerHTML = `<div class="check"></div><span class="device-name" title="${h(label)}">${h(label)}</span><span class="device-idx">#${i+1}</span>`;
    el.addEventListener('click', () => toggleDev(dev.deviceId));
    deviceList.appendChild(el);
  });
}

function toggleDev(id) {
  const i = S.selectedDevices.indexOf(id);
  if (i >= 0) S.selectedDevices.splice(i, 1);
  else {
    if (S.selectedDevices.length < S.selectedCount) S.selectedDevices.push(id);
    else { S.selectedDevices.shift(); S.selectedDevices.push(id); }
  }
  renderDeviceList(); updateWatchBtn();
}

gridSelector.addEventListener('click', e => {
  const btn = e.target.closest('.grid-btn');
  if (!btn) return;
  S.selectedCount = +btn.dataset.count;
  gridSelector.querySelectorAll('.grid-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (S.selectedDevices.length > S.selectedCount) S.selectedDevices = S.selectedDevices.slice(-S.selectedCount);
  renderDeviceList(); updateWatchBtn();
});

function updateWatchBtn() {
  const sel = S.selectedDevices.length, need = S.selectedCount;
  btnWatch.disabled = sel !== need;
  if (!S.devices.length) hintText.innerHTML = 'Conecta una cámara USB y recarga la página';
  else if (sel < need) { const r = need-sel; hintText.innerHTML = `Selecciona <span>${r} cámara${r>1?'s':''} más</span> para continuar`; }
  else hintText.innerHTML = `<span>${sel} cámara${sel>1?'s':''} lista${sel>1?'s':''}</span> — Pulsa Observar`;
}

/* ══════════════════════════════════════════
   START VIEWER
══════════════════════════════════════════ */
btnWatch.addEventListener('click', startViewer);

async function startViewer() {
  configScreen.classList.remove('active');
  viewerScreen.classList.add('active');
  const count = S.selectedDevices.length;
  viewerLabel.textContent = `${count} cámara${count>1?'s':''}`;
  camGrid.className = `cam-grid count-${count}`;
  camGrid.innerHTML = '';
  S.recorders.clear(); S.recTimers.clear(); S.recStart.clear();
  S.globalRecording = false; recAllLabel.textContent = 'Grabar todo'; btnRecAll.classList.remove('recording');
  await Promise.allSettled(S.selectedDevices.map((id,i) => buildCell(id, i, count)));
}

/* ══════════════════════════════════════════
   BUILD CAMERA CELL
══════════════════════════════════════════ */
async function buildCell(deviceId, idx, total) {
  const dev = S.devices.find(d => d.deviceId === deviceId);
  const label = dev ? (dev.label || `Cámara ${idx+1}`) : `Cámara ${idx+1}`;

  const cell = document.createElement('div');
  cell.className = `cam-cell count-${total}`;
  cell.dataset.index    = idx;
  cell.dataset.deviceId = deviceId;
  cell.innerHTML = `<div class="cam-loading"><div class="cam-spinner"></div></div>`;
  camGrid.appendChild(cell);

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { deviceId: { exact: deviceId }, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    S.activeStreams[idx] = stream;

    const video = document.createElement('video');
    video.autoplay = true; video.muted = true; video.playsInline = true;
    video.srcObject = stream;

    /* Ajustar aspect-ratio real de la cámara → borde se adapta, sin barras */
    video.addEventListener('loadedmetadata', () => {
      const w = video.videoWidth, hh = video.videoHeight;
      if (w && hh) cell.style.aspectRatio = `${w}/${hh}`;
      cell.classList.add('neon'); // neón solo cuando el stream está activo
    }, { once: true });

    const flash = document.createElement('div');
    flash.className = 'flash-overlay';

    /* Label inferior */
    const labelEl = document.createElement('div');
    labelEl.className = 'cam-label';
    labelEl.innerHTML = `
      <div class="cam-label-inner">
        <div class="cam-label-dot" id="dot-${idx}"></div>
        <span class="cam-label-text">${h(label)}</span>
        <span class="rec-timer" id="timer-${idx}" style="display:none"></span>
      </div>`;

    /* Controles per-cell */
    const ctrls = document.createElement('div');
    ctrls.className = 'cam-controls';
    ctrls.innerHTML = `
      <button class="ctrl-btn" data-action="photo" data-idx="${idx}" title="Capturar foto">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="1" y="4" width="14" height="10" rx="2"/>
          <circle cx="8" cy="9" r="2.5"/>
          <path d="M5.5 4L6.5 2h3l1 2" stroke-linecap="round"/>
        </svg>
      </button>
      <button class="ctrl-btn rec-btn" data-action="rec" data-idx="${idx}" id="recbtn-${idx}" title="Grabar">
        <svg viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="4.5"/></svg>
      </button>`;

    cell.innerHTML = '';
    cell.appendChild(video);
    cell.appendChild(flash);
    cell.appendChild(labelEl);
    cell.appendChild(ctrls);

    ctrls.addEventListener('click', e => {
      const btn = e.target.closest('[data-action]'); if (!btn) return;
      const i = +btn.dataset.idx;
      if (btn.dataset.action === 'photo') capturePhoto(i, video, label, flash);
      if (btn.dataset.action === 'rec')   toggleRecord(i, stream, label);
    });

    await video.play().catch(() => {});

  } catch(err) {
    let em = 'No se pudo iniciar la cámara.', ed = 'Intenta desconectarla y reconectarla.';
    if (err.name === 'NotReadableError' || err.name === 'TrackStartError') { em = 'Cámara en uso'; ed = 'Cierra la otra aplicación que la usa.'; }
    else if (err.name === 'NotAllowedError') { em = 'Permiso denegado'; ed = 'Habilita el acceso en el navegador.'; }
    else if (err.name === 'NotFoundError')   { em = 'Dispositivo no encontrado'; ed = 'La cámara se desconectó.'; }
    cell.innerHTML = `<div class="cam-error"><div class="cam-error-icon">!</div><h3>${em}</h3><p>${ed}</p><p style="font-size:11px;margin-top:4px;color:var(--text-dim)">${h(label)}</p></div>`;
  }
}

/* ══════════════════════════════════════════
   PHOTO
══════════════════════════════════════════ */
function capturePhoto(idx, videoEl, label, flashEl) {
  const canvas = document.createElement('canvas');
  canvas.width  = videoEl.videoWidth  || 1280;
  canvas.height = videoEl.videoHeight || 720;
  canvas.getContext('2d').drawImage(videoEl, 0, 0, canvas.width, canvas.height);

  flashEl.classList.remove('flash');
  void flashEl.offsetWidth;
  flashEl.classList.add('flash');

  const ts  = new Date();
  const url  = canvas.toDataURL('image/jpeg', 0.93);
  const name = `foto_${safe(label)}_${tsStr(ts)}.jpg`;
  S.photos.unshift({ url, name, label, ts });
  updateBadge(); if (galleryPanel.classList.contains('open')) renderGallery();
}

/* ══════════════════════════════════════════
   VIDEO RECORDING
══════════════════════════════════════════ */
function bestMime() {
  return ['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm','video/mp4']
    .find(t => MediaRecorder.isTypeSupported(t)) || '';
}

function toggleRecord(idx, stream, label) {
  S.recorders.has(idx) ? stopRecord(idx) : startRecord(idx, stream, label);
}

function startRecord(idx, stream, label) {
  const opts = {}; const mime = bestMime(); if (mime) opts.mimeType = mime;
  let rec;
  try { rec = new MediaRecorder(stream, opts); } catch { rec = new MediaRecorder(stream); }
  const chunks = [];
  rec.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  rec.onstop = () => saveVideo(chunks, rec.mimeType, label, idx);
  rec.start(250);
  S.recorders.set(idx, { recorder: rec, chunks, label });
  S.recStart.set(idx, Date.now());

  const timerEl = $(`timer-${idx}`), dotEl = $(`dot-${idx}`), btn = $(`recbtn-${idx}`);
  const cell = document.querySelector(`.cam-cell[data-index="${idx}"]`);
  if (timerEl) timerEl.style.display = 'inline';
  if (dotEl)   dotEl.classList.add('rec');
  if (btn)     btn.classList.add('active');
  if (cell)    cell.classList.add('recording-cell');

  S.recTimers.set(idx, setInterval(() => {
    const s = Math.floor((Date.now() - S.recStart.get(idx)) / 1000);
    if (timerEl) timerEl.textContent = fmtDur(s);
  }, 500));
}

function stopRecord(idx) {
  const r = S.recorders.get(idx); if (!r) return;
  r.recorder.stop();
  S.recorders.delete(idx);
  clearInterval(S.recTimers.get(idx)); S.recTimers.delete(idx);
  const timerEl = $(`timer-${idx}`), dotEl = $(`dot-${idx}`), btn = $(`recbtn-${idx}`);
  const cell = document.querySelector(`.cam-cell[data-index="${idx}"]`);
  if (timerEl) { timerEl.style.display='none'; timerEl.textContent=''; }
  if (dotEl)   dotEl.classList.remove('rec');
  if (btn)     btn.classList.remove('active');
  if (cell)    cell.classList.remove('recording-cell');
  S.recStart.delete(idx);
}

function saveVideo(chunks, mimeType, label, idx) {
  const ext  = (mimeType||'').includes('mp4') ? 'mp4' : 'webm';
  const blob = new Blob(chunks, { type: mimeType || 'video/webm' });
  const url  = URL.createObjectURL(blob);
  const ts   = new Date();
  S.videos.unshift({ url, name: `video_${safe(label)}_${tsStr(ts)}.${ext}`, label, ts, blob });
  updateBadge(); if (galleryPanel.classList.contains('open')) renderGallery();
}

/* ══════════════════════════════════════════
   GLOBAL PHOTO / REC ALL
══════════════════════════════════════════ */
btnPhotoAll.addEventListener('click', () => {
  camGrid.querySelectorAll('.cam-cell').forEach(cell => {
    const idx   = +cell.dataset.index;
    const video = cell.querySelector('video');
    const flash = cell.querySelector('.flash-overlay');
    const dev   = S.devices.find(d => d.deviceId === cell.dataset.deviceId);
    const label = dev ? (dev.label || `Cámara ${idx+1}`) : `Cámara ${idx+1}`;
    if (video && flash) capturePhoto(idx, video, label, flash);
  });
});

btnRecAll.addEventListener('click', () => {
  if (!S.globalRecording) {
    camGrid.querySelectorAll('.cam-cell').forEach(cell => {
      const idx    = +cell.dataset.index;
      const stream = S.activeStreams[idx];
      const dev    = S.devices.find(d => d.deviceId === cell.dataset.deviceId);
      const label  = dev ? (dev.label || `Cámara ${idx+1}`) : `Cámara ${idx+1}`;
      if (stream && !S.recorders.has(idx)) startRecord(idx, stream, label);
    });
    S.globalRecording = true; recAllLabel.textContent = 'Detener todo'; btnRecAll.classList.add('recording');
  } else {
    [...S.recorders.keys()].forEach(stopRecord);
    S.globalRecording = false; recAllLabel.textContent = 'Grabar todo'; btnRecAll.classList.remove('recording');
  }
});

/* ══════════════════════════════════════════
   GALLERY
══════════════════════════════════════════ */
btnGallery.addEventListener('click', () => {
  galleryPanel.classList.toggle('open');
  if (galleryPanel.classList.contains('open')) renderGallery();
});
$('btn-close-gallery').addEventListener('click', () => galleryPanel.classList.remove('open'));

document.querySelectorAll('.gallery-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.gallery-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    S.galleryTab = tab.dataset.tab;
    renderGallery();
  });
});

function updateBadge() {
  const t = S.photos.length + S.videos.length;
  galleryTotal.textContent = t; photosCount.textContent = S.photos.length; videosCount.textContent = S.videos.length;
  galleryBadge.textContent = t > 99 ? '99+' : t;
  galleryBadge.style.display = t ? 'inline' : 'none';
}

function renderGallery() {
  const items = S.galleryTab === 'photos' ? S.photos : S.videos;
  galleryItems.className = 'gallery-items' + (S.galleryTab === 'videos' ? ' videos-tab' : '');
  if (!items.length) { galleryItems.innerHTML = `<div class="gallery-empty">${S.galleryTab==='photos' ? 'Aún no hay fotos' : 'Aún no hay vídeos'}</div>`; return; }
  galleryItems.innerHTML = '';
  items.forEach(item => {
    const el = document.createElement('div');
    el.className = 'gallery-item';
    const dlBtn = `<div class="item-dl" title="Descargar"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7 2v7M4 6l3 3 3-3M2 11h10" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`;
    if (S.galleryTab === 'photos') {
      el.innerHTML = `<img src="${item.url}" alt="${h(item.name)}" loading="lazy"><div class="g-meta"><div class="g-name">${h(item.label)}</div><div class="g-time">${fmtTs(item.ts)}</div></div>${dlBtn}`;
      el.addEventListener('click', () => openModal(item));
    } else {
      el.innerHTML = `<video src="${item.url}" muted playsInline preload="metadata"></video><div class="g-meta"><div class="g-name">${h(item.label)}</div><div class="g-time">${fmtTs(item.ts)}</div></div>${dlBtn}`;
    }
    el.querySelector('.item-dl').addEventListener('click', e => { e.stopPropagation(); dl(item.url, item.name); });
    galleryItems.appendChild(el);
  });
}

function dl(url, name) {
  const a = Object.assign(document.createElement('a'), { href: url, download: name });
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function openModal(item) {
  const m = document.createElement('div');
  m.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;';
  m.innerHTML = `<img src="${item.url}" style="max-width:90vw;max-height:78vh;object-fit:contain;border-radius:8px;">
    <div style="display:flex;gap:10px;">
      <button onclick="this.closest('[style*=fixed]').remove()" style="padding:8px 18px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;font-size:13px;">Cerrar</button>
      <button style="padding:8px 18px;background:var(--accent);border:none;border-radius:8px;color:#0f172a;cursor:pointer;font-size:13px;font-weight:700;" id="_dlbtn">Descargar</button>
    </div>`;
  m.querySelector('#_dlbtn').addEventListener('click', () => dl(item.url, item.name));
  document.body.appendChild(m);
  m.addEventListener('click', e => { if (e.target === m) m.remove(); });
}

/* ══════════════════════════════════════════
   BACK
══════════════════════════════════════════ */
btnBack.addEventListener('click', () => {
  [...S.recorders.keys()].forEach(stopRecord);
  S.activeStreams.forEach(s => s && s.getTracks().forEach(t => t.stop()));
  S.activeStreams = []; camGrid.innerHTML = '';
  galleryPanel.classList.remove('open');
  viewerScreen.classList.remove('active');
  configScreen.classList.add('active');
});

/* ══════════════════════════════════════════
   UTILS
══════════════════════════════════════════ */
const h    = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const safe = s => String(s).replace(/[^a-zA-Z0-9_\-áéíóúñ]/g,'_').slice(0,28);
const p2   = n => String(n).padStart(2,'0');
const tsStr = d => `${d.getFullYear()}${p2(d.getMonth()+1)}${p2(d.getDate())}_${p2(d.getHours())}${p2(d.getMinutes())}${p2(d.getSeconds())}`;
const fmtTs  = d => `${p2(d.getHours())}:${p2(d.getMinutes())}:${p2(d.getSeconds())}`;
const fmtDur = s => `${p2(Math.floor(s/60))}:${p2(s%60)}`;

/* ══════════════════════════════════════════
   BOOT
══════════════════════════════════════════ */
if (!navigator.mediaDevices?.getUserMedia) {
  permErr.textContent = 'Tu navegador no soporta WebRTC. Prueba Chrome, Firefox o Edge en una página HTTPS.';
  permErr.style.display = 'block';
} else {
  init();
}
</script>
</body>
</html>
