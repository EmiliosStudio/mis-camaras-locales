<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Cámaras Locales</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --selected: #22c55e;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            font-size: 2.5rem;
            margin: 20px 0;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(to right, var(--accent), #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .window {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        .window-header {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--accent);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        /* Lista de cámaras */
        ul { list-style: none; padding: 0; margin: 0; }
        .cam-item {
            padding: 12px;
            background: #334155;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 2px solid transparent;
            color: var(--text-dim);
        }
        .cam-item:hover {
            background: #475569;
            color: white;
        }
        .cam-item.selected {
            border-color: var(--selected);
            background: rgba(34, 197, 94, 0.1);
            color: var(--selected);
        }
        .cam-item::before {
            content: "📷";
            font-size: 1rem;
        }

        #observar-btn {
            width: 100%;
            background: var(--accent);
            color: var(--bg);
            font-size: 1.1rem;
            font-weight: bold;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.2s, background 0.2s;
        }
        #observar-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }
        #observar-btn:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
            opacity: 0.6;
        }

        .helper-text {
            text-align: center;
            margin-top: 10px;
            font-size: 0.9rem;
            color: var(--text-dim);
            font-style: italic;
        }

        /* CONTENEDOR DE CÁMARA CENTRADO */
        #visor-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--bg);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .video-wrapper {
            position: relative;
            display: inline-block; /* Importante para que el borde se ajuste al video */
            line-height: 0; /* Elimina espacio extra debajo del video */
            border: 6px solid var(--accent);
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.4);
            max-width: 90%;
            max-height: 75vh;
        }

        video {
            max-width: 100%;
            max-height: 75vh;
            width: auto;
            height: auto;
            border-radius: 6px;
            background: #000;
        }

        .cam-label {
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: var(--bg);
            padding: 4px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        #btn-volver {
            margin-top: 30px;
            background: var(--danger);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="setup-menu">
        <h1>Mis cámaras locales</h1>
        
        <div class="window">
            <div class="window-header">Cámaras a observar</div>
            <button id="observar-btn" onclick="startViewing()" disabled>Observar</button>
            <div class="helper-text">Selecciona la cámara que quieres observar</div>
        </div>

        <div class="window">
            <div class="window-header">Activas</div>
            <ul id="cam-list">
                <li>Detectando dispositivos...</li>
            </ul>
        </div>
    </div>

    <div id="visor-container">
        <div class="video-wrapper">
            <div id="cam-name-tag" class="cam-label">Cámara</div>
            <video id="main-video" autoplay playsinline muted></video>
        </div>
        <button id="btn-volver" onclick="stopViewing()">Volver a la selección de cámaras</button>
    </div>

    <script>
        let videoDevices = [];
        let selectedDeviceId = null;
        let selectedLabel = "";
        let activeStream = null;

        async function init() {
            try {
                // Pedir permiso para listar nombres
                const initialStream = await navigator.mediaDevices.getUserMedia({ video: true });
                initialStream.getTracks().forEach(track => track.stop());

                const devices = await navigator.mediaDevices.enumerateDevices();
                videoDevices = devices.filter(d => d.kind === 'videoinput');
                
                renderList();
            } catch (err) {
                document.getElementById('cam-list').innerHTML = '<li>Error: Se requieren permisos de cámara.</li>';
            }
        }

        function renderList() {
            const listEl = document.getElementById('cam-list');
            listEl.innerHTML = '';

            if (videoDevices.length === 0) {
                listEl.innerHTML = '<li>No se detectaron cámaras.</li>';
                return;
            }

            videoDevices.forEach((device, index) => {
                const li = document.createElement('li');
                li.className = 'cam-item';
                li.textContent = device.label || `Cámara ${index + 1}`;
                li.onclick = () => selectCamera(device.deviceId, li.textContent);
                listEl.appendChild(li);
            });
        }

        function selectCamera(id, label) {
            selectedDeviceId = id;
            selectedLabel = label;
            
            // UI Feedback
            document.querySelectorAll('.cam-item').forEach(el => {
                el.classList.toggle('selected', el.textContent === label);
            });
            
            document.getElementById('observar-btn').disabled = false;
        }

        async function startViewing() {
            if (!selectedDeviceId) return;

            const video = document.getElementById('main-video');
            document.getElementById('cam-name-tag').textContent = selectedLabel;

            try {
                activeStream = await navigator.mediaDevices.getUserMedia({
                    video: { deviceId: { exact: selectedDeviceId } }
                });
                
                video.srcObject = activeStream;
                
                document.getElementById('setup-menu').classList.add('hidden');
                document.getElementById('visor-container').style.display = 'flex';
                
                video.onloadedmetadata = () => video.play();
                
            } catch (e) {
                alert("No se pudo acceder a la cámara seleccionada.");
                console.error(e);
            }
        }

        function stopViewing() {
            if (activeStream) {
                activeStream.getTracks().forEach(track => track.stop());
            }
            document.getElementById('visor-container').style.display = 'none';
            document.getElementById('setup-menu').classList.remove('hidden');
        }

        window.onload = init;
    </script>
</body>
</html>
